name: Gerar EXE Windows

on:
  push:
    branches:
      - main
      - claude/budget-cover-automation-qjkemj
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install pymupdf watchdog pyinstaller

      - name: Gerar EXE
        run: |
          pyinstaller --onefile --console --name "EGEMAP-Monitor" monitorar.py

      - name: Publicar EXE como artefato
        uses: actions/upload-artifact@v4
        with:
          name: EGEMAP-Monitor-Windows
          path: dist/EGEMAP-Monitor.exe
          retention-days: 90
